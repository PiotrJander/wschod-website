<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>WSCHÓD — panel treści</title>
</head>
<body>
  <!-- Netlify Identity for authentication (production, via git-gateway) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.8.0/dist/decap-cms.js"></script>

  <script>
    /* ────────────────────────────────────────────────────────────
       Custom editor components — one-click styled blocks for editors
       that render on-brand on the built site (see .callout / .pullquote
       in the site CSS). The output HTML must contain NO blank lines so
       markdown-it keeps each as a single HTML block.
       ──────────────────────────────────────────────────────────── */

    // Coral callout box (heading + body).
    CMS.registerEditorComponent({
      id: "callout",
      label: "Ramka (callout)",
      fields: [
        { name: "title", label: "Nagłówek", widget: "string", required: false },
        { name: "body", label: "Treść", widget: "text" },
      ],
      pattern: /^<div class="callout">\s*(?:<p class="callout-title">([\s\S]*?)<\/p>)?\s*<p>([\s\S]*?)<\/p>\s*<\/div>$/,
      fromBlock: function (match) {
        return { title: (match[1] || "").trim(), body: (match[2] || "").trim() };
      },
      toBlock: function (obj) {
        var title = (obj.title || "").trim();
        var body = (obj.body || "").trim().replace(/\n+/g, " ");
        var head = title ? '<p class="callout-title">' + title + "</p>" : "";
        return '<div class="callout">' + head + "<p>" + body + "</p></div>";
      },
      toPreview: function (obj) {
        var title = obj.title
          ? '<strong style="display:block;margin-bottom:.4rem">' + obj.title + "</strong>"
          : "";
        return (
          '<div style="border-left:4px solid #e8663a;background:#fdeee7;padding:1rem 1.2rem;border-radius:10px">' +
          title +
          (obj.body || "") +
          "</div>"
        );
      },
    });

    // Large pull-quote with optional attribution.
    CMS.registerEditorComponent({
      id: "pullquote",
      label: "Cytat wyróżniony",
      fields: [
        { name: "quote", label: "Cytat", widget: "text" },
        { name: "cite", label: "Autor / źródło", widget: "string", required: false },
      ],
      pattern: /^<figure class="pullquote">\s*<blockquote>([\s\S]*?)<\/blockquote>\s*(?:<figcaption>([\s\S]*?)<\/figcaption>)?\s*<\/figure>$/,
      fromBlock: function (match) {
        return { quote: (match[1] || "").trim(), cite: (match[2] || "").trim() };
      },
      toBlock: function (obj) {
        var quote = (obj.quote || "").trim().replace(/\n+/g, " ");
        var cite = (obj.cite || "").trim();
        var caption = cite ? "<figcaption>" + cite + "</figcaption>" : "";
        return (
          '<figure class="pullquote"><blockquote>' + quote + "</blockquote>" + caption + "</figure>"
        );
      },
      toPreview: function (obj) {
        var cite = obj.cite
          ? '<figcaption style="margin-top:.6rem;font-size:.85em;opacity:.7">— ' +
            obj.cite +
            "</figcaption>"
          : "";
        return (
          '<figure style="margin:1.6rem 0"><blockquote style="font-style:italic;font-size:1.5em;line-height:1.3;border:0;margin:0;padding:0">' +
          (obj.quote || "") +
          "</blockquote>" +
          cite +
          "</figure>"
        );
      },
    });
  </script>
</body>
</html>
